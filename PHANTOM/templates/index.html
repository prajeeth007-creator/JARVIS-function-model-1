<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PHANTOM</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root{
    --green:#3cff00;
    --black:#0b0b0b;
    --dark:#111;
}

body{
    margin:0;
    height:100vh;
    background:var(--black);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
}

/* ===== MAIN CONTAINER ===== */
.container{
    width:420px;
    height:650px;
    background:var(--dark);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 30px rgba(0,255,0,0.1);
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding:12px;
    color:var(--green);
    border-bottom:1px solid rgba(60,255,0,0.2);
    font-weight:bold;
    letter-spacing:2px;
}

/* ===== FACE PANEL ===== */
.face-panel{
    display:flex;
    justify-content:center;
    padding:20px;
}

.face-screen{
    width:220px;
    height:180px;
    background:#a7ff83;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.eyes{
    display:flex;
    gap:30px;
    margin-bottom:15px;
}

.eye{
    width:22px;
    height:22px;
    background:#111;
    border-radius:50%;
}

.mouth{
    width:70px;
    height:12px;
    background:#111;
    border-radius:10px;
}

/* ===== CHAT AREA ===== */
.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.botText span{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}

.userText{
    text-align:right;
}

.userText span{
    background:#222;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}

/* ===== INPUT AREA ===== */
.input-area{
    padding:12px;
    border-top:1px solid rgba(60,255,0,0.2);
}

#textInput{
    width:100%;
    padding:10px;
    background:transparent;
    border:1px solid rgba(60,255,0,0.4);
    color:white;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    background:transparent;
    border:1px solid var(--green);
    color:var(--green);
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:rgba(60,255,0,0.08);
}
</style>
</head>

<body>

<div class="container">

<div class="header">P.H.A.N.T.O.M</div>

<!-- ===== FACE ===== -->
<div class="face-panel">
    <div class="face-screen">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth" id="mouth"></div>
    </div>
</div>

<!-- ===== CHAT ===== -->
<div class="chat-box" id="chatbox">
    <p class="botText"><span>Phantom online.</span></p>
</div>

<!-- ===== INPUT ===== -->
<div class="input-area">
    <input id="textInput" type="text" placeholder="Say something...">
    <button onclick="sendMessage()">Send</button>
    <button id="micButton">🎤 Speak</button>
</div>

</div>

<script>
/* ===== SEND MESSAGE ===== */
function sendMessage(){
    let text = $("#textInput").val();
    if(text === "") return;

    $("#chatbox").append('<p class="userText"><span>'+text+'</span></p>');
    $("#textInput").val("");

    $.get("/get",{ userMessage:text }).done(function(data){
        $("#chatbox").append('<p class="botText"><span>'+data+'</span></p>');
        $("#chatbox").scrollTop($("#chatbox")[0].scrollHeight);
        speak(data);
    });
}

/* ===== ENTER KEY ===== */
$("#textInput").keypress(function(e){
    if(e.which == 13) sendMessage();
});

/* ===== TEXT TO SPEECH ===== */
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(speech);
}

/* ===== VOICE INPUT ===== */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "en-US";

$("#micButton").click(function(){
    $("#mouth").css("height","25px");
    recognition.start();
});

recognition.onresult = function(event){
    let voiceText = event.results[0][0].transcript;
    $("#textInput").val(voiceText);
    sendMessage();
};

recognition.onend = function(){
    $("#mouth").css("height","12px");
};
</script>

</body>
</html>
